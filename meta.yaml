{% set name = "dynamo-release" %}
{% set version = "1.5.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/aristoteleo/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: ff85e911b5b8c5269d18777d64d7c497165e3aadc895620c8166051a429ddfb9

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  noarch: python

requirements:
  host:
    - python >=3.9
    - setuptools
    - pip
  run:
    - python >=3.9
    - setuptools
    - numpy >=1.20.0
    - pandas >=1.3.5,<3.0.0
    - scipy >=1.4.1
    - scikit-learn >=0.19.1
    - anndata >=0.8.0,<0.11.0
    - loompy >=3.0.5
    - matplotlib-base >=3.7.5
    - numdifftools >=0.9.39
    - umap-learn >=0.5.1
    - patsy >=0.5.1
    - statsmodels >=0.9.0
    - numba >=0.54.0
    - seaborn >=0.9.0
    - colorcet >=2.0.1
    - tqdm
    - igraph >=0.7.1
    - leidenalg
    - pynndescent >=0.5.2
    - networkx >=2.6
    - get_version >=3.5.4
    - typing-extensions
    - openpyxl
    - session-info >=1.0.0
    - adjusttext
    - mudata
    - requests
    - datacache

test:
  imports:
    - dynamo
  requires:
    - pip

about:
  home: https://github.com/aristoteleo/dynamo-release
  summary: 'Inclusive model of expression dynamics with metabolic labeling based scRNA-seq'
  description: |
    Inclusive model of expression dynamics with metabolic labeling based scRNA-seq in silico perturbation predictions.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Xiaojieqiu
